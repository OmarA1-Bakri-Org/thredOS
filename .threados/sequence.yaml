  - id: context7-review
    name: Context7 Documentation Review
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/context7-review.md
    prompt_ref:
      id: context7-review
      version: 1
      path: .threados/prompts/context7-review.md
    depends_on: []
    status: READY
    timeout_ms: 30000
    execution: sequential
    actions:
      - id: resolve_falkordb
