  - id: input-collection
    name: ICP Input Collection
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/input-collection.md
    prompt_ref:
      id: input-collection
      version: 1
      path: .threados/prompts/input-collection.md
    depends_on:
      - setup-workspace
      - pre-session
    status: READY
    timeout_ms: 600000
    execution: sequential
    actions:
      - id: detect_mode
        type: conditional
        description: Detect JSON config vs Q&A mode from Omar's input
        config:
          condition: user_input.contains_json_block == true
          if_true:
            - id: parse_json
              type: cli
              description: Parse JSON config and validate schema
              config:
                command: echo parse_json_config
              output_key: icp_config
              on_failure: abort_workflow
          if_false:
            - id: run_qa
              type: approval
              description: Walk Omar through 10-question ICP Q&A (name, titles, industries,
                geographies, size, sources, pipeline exclusion, enrichment,
                Apollo stage tagging, agent signals)
              config:
                approval_prompt: Answer 10 Q&A questions to build ICP config (segment_name,
                  titles, industries, geographies, size range, sources
                  [apollo_saved|apollo_discovery|both], exclude existing
                  pipeline?, enrich missing emails? max credits?, tag in Apollo?
                  stage name?, signal agents [outlook_bd,linkedin_bd]?)
              output_key: icp_config
              on_failure: abort_workflow
      - id: write_icp_config
        type: write_file
        description: Persist ICP config to /tmp/apollo-segment/icp-config.json
        config:
          file_path: /tmp/apollo-segment/icp-config.json
        on_failure: abort_workflow
    phase: phase-0-setup
    surface_ref: thread-input-collection
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: apollo-saved-contacts-search
    name: Apollo Saved Contacts Search
    kind: base
    type: base
    model: codex
    agent_ref: null
    prompt_file: .threados/prompts/apollo-saved-contacts-search.md
    prompt_ref:
      id: apollo-saved-contacts-search
      version: 1
      path: .threados/prompts/apollo-saved-contacts-search.md
    depends_on:
      - input-collection
    status: READY
    timeout_ms: 600000
    execution: sub_agent
    condition: icp_config.sources contains 'apollo_saved'
    actions:
      - id: spawn_saved_contacts_agent
        type: sub_agent
        description: Spawn sub-agent to search Apollo saved contacts — runs in PARALLEL
          with Apollo Discovery
        config:
          prompt: >-
            Execute Apollo Segment Builder Phase 1a: Apollo Saved Contacts
            Search. You have shell access. Use the Composio CLI directly, not
            abstract tool names.


            INPUT: Read /tmp/apollo-segment/icp-config.json for filters.


            COMMAND RULE: call tools like this exact pattern:
               composio execute TOOL_SLUG -d '{"key":"value"}'

            1. List available contact stages (segment tags):
               Run: composio execute APOLLO_LIST_CONTACT_STAGES -d '{}'
               Capture all { id, name } pairs.

            2. Check Apollo API credits (soft gate):
               Run: composio execute APOLLO_VIEW_API_USAGE_STATS -d '{}'
               If remaining is critically low, flag in the report but proceed (saved-contact search is cheap).

            3. Search existing Apollo contacts — one query per target title:
               Run: composio execute APOLLO_SEARCH_CONTACTS -d '{"q_keywords":"<TITLE>","per_page":100,"page":1}'
               Paginate up to 5 pages per title (hard cap 500 contacts per title).
               Collect: contact_id, email, title, organization_name, organization_id, stage_id, stage_name, owner_id.

            4. Filter locally against ICP criteria (Apollo server-side filtering
            is limited):
               - Title token match (case-insensitive)
               - Seniority match
               - Company domain / industry match
               - Geography match (if location data available)

            5. OWNERSHIP CHECK (MANDATORY): Keep only contacts where owner_id
            matches Omar's Apollo user id OR owner is blank. Drop records owned
            by others.


            6. Write /tmp/apollo-segment/saved-contacts.json with structure:
               { generated_at, stages_available: [{ id, name }], total_contacts, contacts: [{ source: 'apollo_saved', apollo_contact_id, apollo_person_id, name, email, title, company, company_domain, organization_id, phone, current_stage_id, current_stage_name, owner_id }] }

            Do NOT spend enrichment credits in this phase. If Composio auth or
            tool execution is unavailable, explain the blocker clearly and exit
            42.
          subagent_type: general-purpose
        output_key: saved_contacts
        on_failure: warn
    phase: phase-1-discovery
    surface_ref: thread-apollo-saved-contacts-search
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: apollo-discovery
    name: Apollo Prospect Discovery
    kind: base
    type: base
    model: codex
    agent_ref: null
    prompt_file: .threados/prompts/apollo-discovery.md
    prompt_ref:
      id: apollo-discovery
      version: 1
      path: .threados/prompts/apollo-discovery.md
    depends_on:
      - input-collection
    status: READY
    timeout_ms: 600000
    execution: sub_agent
    condition: icp_config.sources contains 'apollo_discovery'
    actions:
      - id: spawn_discovery_agent
        type: sub_agent
        description: Spawn sub-agent for Apollo prospect discovery — runs in PARALLEL
          with Saved Contacts Search
        config:
          prompt: >-
            Execute Apollo Segment Builder Phase 1b: Apollo Prospect Discovery.
            You have shell access. Use the Composio CLI directly, not abstract
            tool names.


            INPUT: Read /tmp/apollo-segment/icp-config.json for filters (titles,
            industry_keywords, geographies, company_size_min/max, email_status).


            COMMAND RULE: call tools like this exact pattern:
               composio execute TOOL_SLUG -d '{"key":"value"}'

            1. CHECK APOLLO API CREDITS FIRST (hard gate):
               Run: composio execute APOLLO_VIEW_API_USAGE_STATS -d '{}'
               If credits are critically low, flag to orchestrator and proceed with reduced scope.

            2. Search for target organisations:
               Run: composio execute APOLLO_ORGANIZATION_SEARCH -d '{"q_organization_keyword_tags":["<INDUSTRY>"],"organization_num_employees_ranges":["<MIN>,<MAX>"],"organization_locations":["<GEO>"],"per_page":25}'
               Collect organization_ids and primary_domain. If any org has empty domain, use APOLLO_ORGANIZATION_ENRICHMENT to fill it.

            3. Search for prospects within discovered organisations per
            persona-lane title bundle:
               Run: composio execute APOLLO_PEOPLE_SEARCH -d '{"q_organization_domains":["example.com"],"person_titles":["Head of Payments"],"person_seniorities":["director","vp","head"],"contact_email_status":["verified","unverified"],"per_page":25}'

            4. PRE-ENRICHMENT DEDUP (CRITICAL — prevents double-spend). For each
            prospect, check FalkorDB:
               python3 /mnt/c/Users/albak/xdev/Claude_Code_Automations/scripts/state_manager.py check-contact --email "prospect@company.com" --name "Name" --company-name "Company"
               Tag prospect with already_enriched: true if FalkorDB returns existing email/phone.

            5. Do NOT spend enrichment credits in this phase. Collect has_email
            / has_direct_phone flags from APOLLO_PEOPLE_SEARCH and record them
            on each prospect.


            6. Write /tmp/apollo-segment/discovered-prospects.json with
            structure:
               { generated_at, credits_used: 0, credits_remaining, organizations_searched, prospects: [{ source: 'apollo_discovery', apollo_person_id, name, title, email (nullable), has_email, has_direct_phone, phone (nullable), company, company_domain, organization_id, linkedin_url, seniority, persona_lane, already_enriched, relevance_notes }] }

            If Composio auth or tool execution is unavailable, explain the
            blocker clearly and exit 42.
          subagent_type: general-purpose
        output_key: discovered_prospects
        on_failure: warn
    phase: phase-1-discovery
    surface_ref: thread-apollo-discovery
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: merge-dedup-comply
    name: Merge Dedup and Compliance
    kind: base
    type: base
    model: codex
    agent_ref: null
    prompt_file: .threados/prompts/merge-dedup-comply.md
    prompt_ref:
      id: merge-dedup-comply
      version: 1
      path: .threados/prompts/merge-dedup-comply.md
    depends_on:
      - apollo-saved-contacts-search
      - apollo-discovery
    status: READY
    timeout_ms: 600000
    execution: sub_agent
    actions:
      - id: spawn_merge_agent
        type: sub_agent
        description: Spawn sub-agent to merge, dedup, and compliance-check the segment
        config:
          prompt: >-
            Execute Apollo Segment Builder Phase 2: Merge, Dedup & Compliance.
            You have access to the state_manager.py CLI.


            INPUTS (read these files; any may be missing):

            - /tmp/apollo-segment/saved-contacts.json (from Phase 1a)

            - /tmp/apollo-segment/discovered-prospects.json (from Phase 1b)

            - /tmp/apollo-segment/icp-config.json


            SHARED REFERENCES (read for context):

            - shared_references/compliance-rules.md

            - shared_references/persona-routing.md

            - shared_references/prospect-selection.md

            - shared_references/thegent-company-info.md


            STEPS:


            1. MERGE saved-contact and discovery results into a single list.


            2. DEDUP by: (a) exact email (case-insensitive), (b)
            apollo_person_id match, (c) fuzzy name+company. When both sources
            have the same contact, merge (prefer saved record for CRM fields,
            prefer discovery for firmographics). Mark source: 'both'.


            3. COMPLIANCE CHECK for each contact (prefer pre-session-check cache
            first, fall back to check-contact for cache misses):
               python3 /mnt/c/Users/albak/xdev/Claude_Code_Automations/scripts/state_manager.py check-contact --email "{email}" --name "{name}" --company-name "{company}"
               DO_NOT_CONTACT: exclude. CAUTION: include with flag. CLEAR: include.

            4. PERSONA LANE assignment (A-E) using persona-routing.md title
            matching:
               - A (Treasury): CFO, Treasurer, Finance Director, Head of Treasury
               - B (Payments): Head of Payments, Ops Director, COO, CSO, Settlement Manager
               - C (Partnerships): BD Director, Partnerships Manager, Co-Founder
               - D (Technical): CTO, VP Engineering, Technical Lead
               - E (Compliance): CCO, Head of Compliance, Risk Officer

            5. MOTION TYPE: FC if company holds PSP/EMI/banking license or is
            licensed exchange; Participant if network-only; default FC.


            6. PIPELINE EXCLUSION if
            icp_config.filters.exclude_existing_pipeline: true — drop contacts
            with active pipeline motion in FalkorDB.


            7. RECENTLY CONTACTED EXCLUSION if
            icp_config.filters.exclude_recently_contacted_days is set — drop
            contacts contacted within N days (from FalkorDB interaction history
            / pre-session cache).


            8. SPECIAL-HANDLING EXCLUSION: always drop known large incumbents /
            tier-1 banks / SentBe-style special accounts unless config
            explicitly opts them in.


            9. FIT SCORING: High (exact title + target industry + target geo),
            Medium (partial title OR adjacent industry), Low (weak
            single-criterion match).


            10. FLAG needs_enrichment: true when email is null or phone is null
            AND already_enriched is false.
                FLAG needs_create_in_apollo: true for discovery-only contacts with no apollo_contact_id.

            11. HARD GATE: at least 1 contact must pass. If empty, abort with
            exclusion breakdown.


            12. WRITE /tmp/apollo-segment/qualified-segment.json with structure:
                { generated_at, segment_name, total_qualified, excluded: { dnc, recently_contacted, existing_pipeline, special_handling, non_omar_owned, duplicates }, contacts: [{ name, email, title, company, company_domain, phone, source, apollo_contact_id, apollo_person_id, organization_id, current_stage_id, persona_lane, motion_type, dedup_status, fit_score, needs_enrichment, needs_create_in_apollo, flags, relevance_notes }] }
          subagent_type: general-purpose
        output_key: qualified_segment
        on_failure: abort_workflow
    phase: phase-2-qualification
    surface_ref: thread-merge-dedup-comply
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: enrichment
    name: Apollo Enrichment
    kind: base
    type: base
    model: codex
    agent_ref: null
    prompt_file: .threados/prompts/enrichment.md
    prompt_ref:
      id: enrichment
      version: 1
      path: .threados/prompts/enrichment.md
    depends_on:
      - merge-dedup-comply
    status: READY
    timeout_ms: 600000
    execution: sub_agent
    condition: icp_config.enrichment.enrich_missing_emails == true AND
      qualified_segment.contacts has any needs_enrichment == true
    actions:
      - id: spawn_enrichment_agent
        type: sub_agent
        description: Spawn sub-agent to enrich contacts missing email/phone
        config:
          prompt: >-
            Execute Apollo Segment Builder Phase 3: Apollo Enrichment. You have
            access to Rube Apollo tools.


            INPUTS:

            - /tmp/apollo-segment/qualified-segment.json

            - /tmp/apollo-segment/icp-config.json
            (icp_config.enrichment.max_apollo_credits caps spend, default 20)


            STEPS:


            1. HARD CREDIT GATE: Check APOLLO_VIEW_API_USAGE_STATS. If remaining
            < 10 OR icp_config.enrichment.max_apollo_credits already consumed,
            abort with a partial enrichment report. When credits are tight,
            prioritise High fit_score contacts.


            2. PRE-ENRICHMENT DEDUP (re-check FalkorDB — data may have updated
            since Phase 1b):
               python3 /mnt/c/Users/albak/xdev/Claude_Code_Automations/scripts/state_manager.py check-contact --email "{email_if_any}" --name "{name}" --company-name "{company}"
               Skip any contact that now has an email in FalkorDB.

            3. BULK ENRICH in batches of 10 using apollo_person_id when
            available (best hit rate):
               Use APOLLO_BULK_PEOPLE_ENRICHMENT with details: [{id: PERSON_ID}, ...] (max 10 per call).
               Map matches[] back to request order. Treat missing_records > 0 as partial success — retry missing records individually via APOLLO_PEOPLE_ENRICHMENT.

            4. FALLBACK individual enrichment for records without
            apollo_person_id OR bulk failures:
               Use APOLLO_PEOPLE_ENRICHMENT with first_name, last_name, organization_name, domain (bare hostname, no protocol, no www.).

            5. RATE LIMIT: Stop at icp_config.enrichment.max_apollo_credits. Tag
            remaining contacts enrichment_skipped: 'credit_cap'.


            6. HANDLE 403 responses as hard stop — do NOT retry. Flag to
            orchestrator with error context.


            7. WRITE /tmp/apollo-segment/enriched-segment.json — same schema as
            qualified-segment.json with enriched email/phone filled in. Record
            actual credits_used and credits_remaining at the top of the file.
          subagent_type: general-purpose
        output_key: enriched_segment
        on_failure: warn
    phase: phase-3-enrichment
    surface_ref: thread-enrichment
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: review-approval
    name: Segment Review and Approval
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/review-approval.md
    prompt_ref:
      id: review-approval
      version: 1
      path: .threados/prompts/review-approval.md
    depends_on:
      - merge-dedup-comply
    status: READY
    timeout_ms: 0
    execution: sequential
    actions:
      - id: present_segment
        type: approval
        description: Display segment table with name, title, company, email, source,
          persona, fit, flag columns. Include exclusion breakdown, credit usage,
          and resolved target stage.
        config:
          approval_prompt: >-
            Segment '{{qualified_segment.segment_name}}' ready for review:


            Total qualified: {{qualified_segment.total_qualified}}

            Sources: Saved [{{counts.saved}}] | Discovery [{{counts.discovery}}]
            | Both [{{counts.both}}]

            Persona split: A:[{{counts.A}}] B:[{{counts.B}}] C:[{{counts.C}}]
            D:[{{counts.D}}] E:[{{counts.E}}]


            Excluded: DNC {{excluded.dnc}} | Recent
            {{excluded.recently_contacted}} | Pipeline
            {{excluded.existing_pipeline}} | Special
            {{excluded.special_handling}} | Non-Omar {{excluded.non_omar_owned}}
            | Dupes {{excluded.duplicates}}


            Apollo credits used: {{enriched_segment.credits_used}} /
            {{icp_config.enrichment.max_apollo_credits}}

            Target Apollo stage: {{icp_config.output.apollo_stage_name}}
            (resolved id: {{stage_id_or_MISSING}})


            Approve all | Remove #N | Add notes | Reject
        output_key: approved_segment
        on_failure: abort_workflow
    phase: phase-4-approval
    surface_ref: thread-review-approval
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: resolve-apollo-stage
    name: Resolve Apollo Target Stage
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/resolve-apollo-stage.md
    prompt_ref:
      id: resolve-apollo-stage
      version: 1
      path: .threados/prompts/resolve-apollo-stage.md
    depends_on:
      - review-approval
    status: READY
    timeout_ms: 30000
    execution: sequential
    condition: icp_config.output.tag_in_apollo == true
    actions:
      - id: lookup_stage
        type: cli
        description: Match icp_config.output.apollo_stage_name against
          saved_contacts.stages_available
        config:
          command: echo lookup_stage_id
        output_key: resolved_stage_id
        on_failure: warn
      - id: ask_if_missing
        type: conditional
        description: If stage not found, ask Omar whether to proceed without tagging
        config:
          condition: resolved_stage_id == null
          if_true:
            - id: missing_stage_approval
              type: approval
              config:
                approval_prompt: Stage '{{icp_config.output.apollo_stage_name}}' not found in
                  Apollo. Rube cannot create stages — create it in Apollo UI and
                  re-run, OR proceed without tagging for this run?
              output_key: missing_stage_decision
              on_failure: abort_workflow
          if_false: []
    phase: phase-5-persistence
    surface_ref: thread-resolve-apollo-stage
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: create-missing-apollo-contacts
    name: Create Missing Apollo Contacts
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/create-missing-apollo-contacts.md
    prompt_ref:
      id: create-missing-apollo-contacts
      version: 1
      path: .threados/prompts/create-missing-apollo-contacts.md
    depends_on:
      - review-approval
    status: READY
    timeout_ms: 600000
    execution: sequential
    condition: icp_config.output.create_missing_contacts == true
    actions:
      - id: search_for_duplicate
        type: composio_tool
        description: "Pre-create dedup: APOLLO_CREATE_CONTACT does not dedup automatically"
        config:
          tool_slug: APOLLO_SEARCH_CONTACTS
          arguments:
            q_keywords: "{{item.email}}"
            per_page: 5
        output_key: existing_apollo_match
        on_failure: warn
      - id: create_contact
        type: conditional
        description: Only create when no existing Apollo contact matches the email
        config:
          condition: existing_apollo_match.contacts.length == 0
          if_true:
            - id: apollo_create
              type: rube_tool
              config:
                tool_slug: APOLLO_CREATE_CONTACT
                arguments:
                  first_name: "{{item.first_name}}"
                  last_name: "{{item.last_name}}"
                  email: "{{item.email}}"
                  title: "{{item.title}}"
                  organization_name: "{{item.company}}"
                  account_id: "{{item.organization_id}}"
              output_key: new_contact_id
              retry:
                max_attempts: 2
                delay_ms: 2000
                backoff: linear
                retry_on:
                  - timeout
                  - connection_error
              on_failure: warn
          if_false:
            - id: reuse_existing_id
              type: cli
              description: Reuse the first matching existing Apollo contact_id
              config:
                command: echo reuse_existing_apollo_id
              output_key: new_contact_id
              on_failure: warn
    phase: phase-5-persistence
    surface_ref: thread-create-missing-apollo-contacts
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: update-apollo-stages
    name: Update Apollo Stages
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/update-apollo-stages.md
    prompt_ref:
      id: update-apollo-stages
      version: 1
      path: .threados/prompts/update-apollo-stages.md
    depends_on:
      - review-approval
    status: READY
    timeout_ms: 300000
    execution: sequential
    condition: icp_config.output.tag_in_apollo == true AND resolved_stage_id != null
    actions:
      - id: batch_update_stage
        type: composio_tool
        description: APOLLO_UPDATE_CONTACT_STAGE accepts contact_ids array for batch tagging
        config:
          tool_slug: APOLLO_UPDATE_CONTACT_STAGE
          arguments:
            contact_ids: "{{approved_segment.contacts.apollo_contact_id_array}}"
            contact_stage_id: "{{resolved_stage_id}}"
        retry:
          max_attempts: 2
          delay_ms: 2000
          backoff: linear
          retry_on:
            - timeout
            - connection_error
        output_key: stage_update_result
        on_failure: warn
    phase: phase-5-persistence
    surface_ref: thread-update-apollo-stages
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: falkordb-upsert-and-signal
    name: FalkorDB Upsert and Signal
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/falkordb-upsert-and-signal.md
    prompt_ref:
      id: falkordb-upsert-and-signal
      version: 1
      path: .threados/prompts/falkordb-upsert-and-signal.md
    depends_on:
      - review-approval
    status: READY
    timeout_ms: 300000
    execution: sequential
    actions:
      - id: upsert_contact
        type: cli
        description: Upsert contact node + WORKS_AT company relationship in FalkorDB
        config:
          command: python3
            /mnt/c/Users/albak/xdev/Claude_Code_Automations/scripts/state_manager.py
            upsert-contact --email "{{item.email}}" --name "{{item.name}}"
            --title "{{item.title}}" --company-name "{{item.company}}"
            --persona-lane "{{item.persona_lane}}" --classification
            "{{item.classification_or_COOL}}"
        on_failure: warn
    phase: phase-5-persistence
    surface_ref: thread-falkordb-upsert-and-signal
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: signal-agents
    name: Signal Downstream Agents
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/signal-agents.md
    prompt_ref:
      id: signal-agents
      version: 1
      path: .threados/prompts/signal-agents.md
    depends_on:
      - falkordb-upsert-and-signal
    status: READY
    timeout_ms: 60000
    execution: sequential
    condition: icp_config.output.signal_to_agents.length > 0
    actions:
      - id: post_signal
        type: cli
        config:
          command: python3
            /mnt/c/Users/albak/xdev/Claude_Code_Automations/scripts/state_manager.py
            post-message --from-agent "apollo_segment_builder" --to-agent
            "{{item}}" --type "SEGMENT_BUILT" --payload
            '{"segment_name":"{{icp_config.segment_name}}","apollo_stage_name":"{{icp_config.output.apollo_stage_name}}","apollo_stage_id":"{{resolved_stage_id}}","contacts":{{approved_segment.contacts.length}},"persona_split":{{counts.persona_split}}}'
        on_failure: warn
    phase: phase-5-persistence
    surface_ref: thread-signal-agents
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: remember-learnings
    name: Remember Segment Learnings
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/remember-learnings.md
    prompt_ref:
      id: remember-learnings
      version: 1
      path: .threados/prompts/remember-learnings.md
    depends_on:
      - falkordb-upsert-and-signal
    status: READY
    timeout_ms: 15000
    execution: sequential
    actions:
      - id: remember_cmd
        type: cli
        config:
          command: 'python3
            /mnt/c/Users/albak/xdev/Claude_Code_Automations/scripts/state_manager.py
            remember --key "segment_{{icp_config.segment_name}}" --content
            "Built segment with {{approved_segment.contacts.length}} contacts.
            Sources: saved {{counts.saved}}, discovery {{counts.discovery}}. Top
            industries: {{counts.industries}}. Top geographies:
            {{counts.geographies}}. Apollo stage:
            {{icp_config.output.apollo_stage_name}}." --tags
            "segment,icp,apollo" --agent "apollo_segment_builder"'
        on_failure: skip
    phase: phase-5-persistence
    surface_ref: thread-remember-learnings
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: display-summary
    name: Display Summary
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/display-summary.md
    prompt_ref:
      id: display-summary
      version: 1
      path: .threados/prompts/display-summary.md
    depends_on:
      - remember-learnings
    status: READY
    timeout_ms: 15000
    execution: sequential
    actions:
      - id: compile_summary
        type: cli
        config:
          command: >-
            echo '=== APOLLO SEGMENT BUILT ===

            Time: {{timestamp}}

            Segment: {{icp_config.segment_name}}


            SOURCES:
              - Saved contacts: {{counts.saved}}
              - Discovery: {{counts.discovery}}
              - Both: {{counts.both}}

            QUALIFIED: {{qualified_segment.total_qualified}}

            APPROVED: {{approved_segment.contacts.length}}


            EXCLUDED:
              - DNC: {{excluded.dnc}}
              - Recently contacted: {{excluded.recently_contacted}}
              - Existing pipeline: {{excluded.existing_pipeline}}
              - Special handling: {{excluded.special_handling}}
              - Non-Omar owned: {{excluded.non_omar_owned}}
              - Duplicates: {{excluded.duplicates}}

            APOLLO:
              - Credits used: {{enriched_segment.credits_used}}
              - Credits remaining: {{enriched_segment.credits_remaining}}
              - Stage tagged: {{icp_config.output.apollo_stage_name}} ({{counts.stage_updates}})
              - New contacts created: {{counts.created}}

            SIGNALED: {{icp_config.output.signal_to_agents}}

            ==='
        on_failure: warn
    phase: phase-6-summary
    surface_ref: thread-display-summary
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: telegram-summary
    name: Telegram Alert
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/telegram-summary.md
    prompt_ref:
      id: telegram-summary
      version: 1
      path: .threados/prompts/telegram-summary.md
    depends_on:
      - display-summary
    status: READY
    timeout_ms: 15000
    execution: sequential
    actions:
      - id: send_telegram
        type: composio_tool
        config:
          tool_slug: TELEGRAM_SEND_MESSAGE
          arguments:
            chat_id: "1778273779"
            text: >-
              Apollo Segment Built: {{icp_config.segment_name}}


              Qualified: {{qualified_segment.total_qualified}}

              Approved: {{approved_segment.contacts.length}}

              Saved: {{counts.saved}} | Discovery: {{counts.discovery}}

              Credits: {{enriched_segment.credits_used}}

              Tagged in Apollo: {{counts.stage_updates}} (stage:
              {{icp_config.output.apollo_stage_name}})

              Signaled: {{counts.agents_signaled}}
        on_failure: warn
    phase: phase-6-summary
    surface_ref: thread-telegram-summary
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
  - id: log-session
    name: Log Session and Cleanup
    kind: base
    type: base
    model: shell
    agent_ref: null
    prompt_file: .threados/prompts/log-session.md
    prompt_ref:
      id: log-session
      version: 1
      path: .threados/prompts/log-session.md
    depends_on:
      - telegram-summary
    status: READY
    timeout_ms: 15000
    execution: sequential
    actions:
      - id: log_session_cmd
        type: cli
        config:
          command: "python3
            /mnt/c/Users/albak/xdev/Claude_Code_Automations/scripts/state_manag\
            er.py log-session --session-id \"apollo-segment-{{date}}-{{time}}\"
            --agent-name \"apollo_segment_builder\" --skills-run
            \"segment_building,apollo_saved_search,apollo_discovery,apollo_enri\
            chment,apollo_stage_tagging\" --contacts-processed
            {{qualified_segment.total_qualified}} --interactions-logged 0
            --follow-ups-created 0 --summary \"Built segment
            '{{icp_config.segment_name}}': {{approved_segment.contacts.length}}
            contacts approved from {{qualified_segment.total_qualified}}
            qualified (saved: {{counts.saved}}, discovery:
            {{counts.discovery}}). Credits used:
            {{enriched_segment.credits_used}}.\""
        on_failure: warn
      - id: cleanup
        type: cli
        description: Remove temp working directory (NOT shared-intel)
        config:
          command: rm -rf /tmp/apollo-segment/
        on_failure: skip
    phase: phase-6-summary
    surface_ref: thread-log-session
    input_contract_ref: null
    output_contract_ref: null
    gate_set_ref: apollo-preflight
    completion_contract: null
    side_effect_class: execute
