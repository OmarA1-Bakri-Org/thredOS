gates:
  - id: context7-loaded
    name: context7-loaded
    depends_on:
      - context7-review
    status: PENDING
    cascade: false
    childGateIds: []
    description: Context7 FalkorDB docs not loaded — proceeding with cached knowledge
    acceptance_conditions:
      - context7.falkordb_docs_loaded == true
    required_review: false
  - id: not-stateless
    name: not-stateless
    depends_on:
      - health-check
    status: PENDING
    cascade: false
    childGateIds: []
    description: State manager is stateless — cannot proceed. Send Telegram alert.
    acceptance_conditions:
      - health.mode != 'stateless'
    required_review: false
  - id: degraded-warning
    name: degraded-warning
    depends_on:
      - health-check
    status: PENDING
    cascade: false
    childGateIds: []
    description: State manager is degraded — SQLite fallback active. Proceeding with
      caution.
    acceptance_conditions:
      - health.mode == 'normal'
    required_review: false
  - id: icp-has-filters
    name: icp-has-filters
    depends_on:
      - input-collection
    status: PENDING
    cascade: false
    childGateIds: []
    description: ICP config must have at least one filter criterion (titles OR
      industry_keywords OR geographies)
    acceptance_conditions:
      - icp_config.filters.titles.length > 0 OR
        icp_config.filters.industry_keywords.length > 0 OR
        icp_config.filters.geographies.length > 0
    required_review: false
  - id: icp-has-segment-name
    name: icp-has-segment-name
    depends_on:
      - input-collection
    status: PENDING
    cascade: false
    childGateIds: []
    description: ICP config must include a segment_name
    acceptance_conditions:
      - icp_config.segment_name is string AND icp_config.segment_name.length > 0
    required_review: false
  - id: icp-has-sources
    name: icp-has-sources
    depends_on:
      - input-collection
    status: PENDING
    cascade: false
    childGateIds: []
    description: ICP config must specify sources (apollo_saved and/or apollo_discovery)
    acceptance_conditions:
      - icp_config.sources is array AND icp_config.sources.length > 0
    required_review: false
  - id: saved-contacts-exists
    name: saved-contacts-exists
    depends_on:
      - apollo-saved-contacts-search
    status: PENDING
    cascade: false
    childGateIds: []
    description: Saved Contacts sub-agent did not produce saved-contacts.json —
      merge will use discovery data only
    acceptance_conditions:
      - file_exists('/tmp/apollo-segment/saved-contacts.json')
    required_review: false
  - id: saved-contacts-valid-json
    name: saved-contacts-valid-json
    depends_on:
      - apollo-saved-contacts-search
    status: PENDING
    cascade: false
    childGateIds: []
    description: Saved contacts report is not valid JSON
    acceptance_conditions:
      - json_valid(saved_contacts)
    required_review: false
  - id: stages-available-captured
    name: stages-available-captured
    depends_on:
      - apollo-saved-contacts-search
    status: PENDING
    cascade: false
    childGateIds: []
    description: Stage list not captured — cannot tag segment later
    acceptance_conditions:
      - saved_contacts.stages_available is array
    required_review: false
  - id: discovered-exists
    name: discovered-exists
    depends_on:
      - apollo-discovery
    status: PENDING
    cascade: false
    childGateIds: []
    description: Discovery sub-agent did not produce discovered-prospects.json —
      merge will use saved-contacts only
    acceptance_conditions:
      - file_exists('/tmp/apollo-segment/discovered-prospects.json')
    required_review: false
  - id: discovered-valid-json
    name: discovered-valid-json
    depends_on:
      - apollo-discovery
    status: PENDING
    cascade: false
    childGateIds: []
    description: Discovered prospects report is not valid JSON
    acceptance_conditions:
      - json_valid(discovered_prospects)
    required_review: false
  - id: no-credits-spent-in-discovery
    name: no-credits-spent-in-discovery
    depends_on:
      - apollo-discovery
    status: PENDING
    cascade: false
    childGateIds: []
    description: "CRITICAL: Discovery phase must not spend enrichment credits —
      enrichment is Phase 3 only"
    acceptance_conditions:
      - discovered_prospects.credits_used == 0
    required_review: false
  - id: qualified-exists
    name: qualified-exists
    depends_on:
      - merge-dedup-comply
    status: PENDING
    cascade: false
    childGateIds: []
    description: Merge sub-agent did not produce qualified-segment.json
    acceptance_conditions:
      - file_exists('/tmp/apollo-segment/qualified-segment.json')
    required_review: false
  - id: qualified-valid-json
    name: qualified-valid-json
    depends_on:
      - merge-dedup-comply
    status: PENDING
    cascade: false
    childGateIds: []
    description: Qualified segment is not valid JSON
    acceptance_conditions:
      - json_valid(qualified_segment)
    required_review: false
  - id: qualified-non-empty
    name: qualified-non-empty
    depends_on:
      - merge-dedup-comply
    status: PENDING
    cascade: false
    childGateIds: []
    description: Segment is empty after filtering — aborting. Review exclusion breakdown.
    acceptance_conditions:
      - qualified_segment.total_qualified > 0
    required_review: false
  - id: qualified-has-required-fields
    name: qualified-has-required-fields
    depends_on:
      - merge-dedup-comply
    status: PENDING
    cascade: false
    childGateIds: []
    description: Qualified segment missing required fields
    acceptance_conditions:
      - qualified_segment.segment_name AND qualified_segment.contacts is array
        AND qualified_segment.excluded
    required_review: false
  - id: enriched-exists
    name: enriched-exists
    depends_on:
      - enrichment
    status: PENDING
    cascade: false
    childGateIds: []
    description: Enrichment sub-agent did not produce enriched-segment.json —
      proceeding with qualified-segment.json
    acceptance_conditions:
      - file_exists('/tmp/apollo-segment/enriched-segment.json')
    required_review: false
  - id: enrichment-credit-budget-respected
    name: enrichment-credit-budget-respected
    depends_on:
      - enrichment
    status: PENDING
    cascade: false
    childGateIds: []
    description: "CRITICAL: Enrichment exceeded configured credit cap"
    acceptance_conditions:
      - enriched_segment.credits_used <= icp_config.enrichment.max_apollo_credits
    required_review: false
  - id: enrichment-credit-budget-hard-ceiling
    name: enrichment-credit-budget-hard-ceiling
    depends_on:
      - enrichment
    status: PENDING
    cascade: false
    childGateIds: []
    description: "CRITICAL: Enrichment exceeded 20-credit session ceiling regardless
      of config"
    acceptance_conditions:
      - enriched_segment.credits_used <= 20
    required_review: false
  - id: at-least-one-approved
    name: at-least-one-approved
    depends_on:
      - review-approval
    status: PENDING
    cascade: false
    childGateIds: []
    description: No contacts approved — aborting segment build
    acceptance_conditions:
      - approved_segment.contacts.length > 0
    required_review: false
  - id: no-403-on-create
    name: no-403-on-create
    depends_on:
      - create-missing-apollo-contacts
    status: PENDING
    cascade: false
    childGateIds: []
    description: Apollo returned 403 on create — API key / plan problem. Do not retry.
    acceptance_conditions:
      - last_response.status != 403
    required_review: false
  - id: no-403-on-stage-update
    name: no-403-on-stage-update
    depends_on:
      - update-apollo-stages
    status: PENDING
    cascade: false
    childGateIds: []
    description: Apollo returned 403 on stage update — API key / plan problem. Do not retry.
    acceptance_conditions:
      - stage_update_result.status != 403
    required_review: false
